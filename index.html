<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Daily</title>
<style>
  :root{
    --cream:#F5E3D9; --ink:#23283B; --ink-soft:#635749;
    --gold:#CDA050; --gold-deep:#966F2D;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--cream);overflow:hidden;
    font:16px/1.5 -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #stage{position:fixed;inset:0;cursor:default}
  .layer{position:absolute;inset:0;transform-origin:50% 62%;
    animation:drift 18s ease-in-out infinite alternate;will-change:transform}
  @keyframes drift{from{transform:scale(1.004)}to{transform:scale(1.022)}}
  .still,.leg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transition:opacity .6s ease}
  .leg{transition:opacity .14s linear}

  /* copy panel — centered against the art's mass, upper-left cream */
  .copy{position:absolute;top:50%;left:5vw;width:46vw;max-width:760px;
    opacity:0;transform:translateY(calc(-50% - 8px));
    transition:opacity .22s ease,transform .22s ease}
  .copy.in{opacity:1;transform:translateY(-50%);transition:opacity .3s ease,transform .3s ease}
  .copy .chip,.copy h1,.copy p{opacity:0;transform:translateY(14px);
    transition:opacity .55s cubic-bezier(.16,1,.3,1),transform .55s cubic-bezier(.16,1,.3,1),
      filter .55s cubic-bezier(.16,1,.3,1)}
  .copy h1{filter:blur(6px)}
  .copy.in .chip{opacity:1;transform:none;transition-delay:.05s}
  .copy.in h1{opacity:1;transform:none;filter:blur(0);transition-delay:.12s}
  .copy.in p{opacity:1;transform:none;transition-delay:.22s}

  .copy .chip{display:inline-block;font-size:13px;font-weight:600;letter-spacing:.16em;
    text-transform:uppercase;color:var(--gold-deep);
    border:1px solid rgba(205,160,80,.55);border-radius:100px;
    padding:6px 12px 6px 15px;margin-bottom:22px;background:#F7EDE2}
  .copy h1{font-family:ui-serif,Georgia,'Times New Roman',serif;font-weight:600;
    font-size:clamp(2.6rem,5.2vw,4.5rem);line-height:1.06;letter-spacing:-.015em;
    text-wrap:balance}
  .copy h1 em{font-style:italic;letter-spacing:0}
  .copy p{margin-top:18px;font-size:clamp(1.15rem,1.7vw,1.5rem);line-height:1.45;
    color:rgba(35,40,59,.78);max-width:34ch}
  .copy p.byline{margin-top:20px;font-size:14px;font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gold-deep);max-width:none}

  /* receipt — folds open like paper, rows print in */
  .receipt{margin-top:28px;display:inline-block;background:rgba(253,249,243,.92);
    border:1px solid #DCCDBB;border-radius:12px;padding:18px 22px;
    box-shadow:0 10px 30px rgba(35,40,59,.08);
    transform-origin:top center;transform:perspective(700px) rotateX(-58deg);opacity:0}
  .copy.in .receipt{opacity:1;transform:perspective(700px) rotateX(0);
    transition:transform .7s cubic-bezier(.3,1.25,.4,1) .3s,opacity .35s ease .3s}
  .receipt .r{font-size:16px;line-height:1.35;color:var(--ink-soft);padding:7px 0;
    border-bottom:1px dashed #E8DACA;opacity:0;transition:opacity .4s ease}
  .copy.in .receipt .r{opacity:1}
  .copy.in .receipt .r:nth-child(1){transition-delay:.42s}
  .copy.in .receipt .r:nth-child(2){transition-delay:.52s}
  .copy.in .receipt .r:nth-child(3){transition-delay:.62s}
  .copy.in .receipt .r:nth-child(4){transition-delay:.72s}
  .copy.in .receipt .r:nth-child(5){transition-delay:.82s}
  .receipt .r:last-child{border-bottom:none}
  .receipt .r.gold{color:var(--gold-deep);font-weight:600}

  /* founder video — a matted print, slides in from the right */
  .founder{position:absolute;right:7vw;top:50%;
    transform:translateY(-50%) translateX(36px) scale(.94);
    width:min(24vw,300px);aspect-ratio:9/16;border-radius:16px;overflow:hidden;
    border:1px solid rgba(205,160,80,.9);
    box-shadow:0 0 0 6px rgba(245,227,217,.65),0 40px 90px rgba(35,40,59,.4);
    opacity:0;pointer-events:none;
    transition:opacity .45s ease,transform .65s cubic-bezier(.3,1.3,.45,1);background:#1D2233}
  .founder.show{opacity:1;transform:translateY(-50%) translateX(0) scale(1)}
  .founder video{width:100%;height:100%;object-fit:cover;display:block}
  .founder .fcap{position:absolute;left:0;right:0;bottom:0;padding:12px 14px;
    font-size:13.5px;letter-spacing:.01em;color:var(--cream);
    background:linear-gradient(transparent,rgba(29,34,51,.85));
    opacity:0;transition:opacity .4s ease .5s}
  .founder.show .fcap{opacity:1}

  /* progress rail — grouped by story act */
  .rail{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;gap:9px}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(35,40,59,.25);transition:all .3s}
  .dot:nth-child(6),.dot:nth-child(9){margin-left:12px}
  .dot.done{background:rgba(205,160,80,.55)}
  .dot.on{background:var(--gold);transform:scale(1.45)}

  /* presenter clock */
  .clock{position:absolute;left:26px;bottom:22px;font:600 13px ui-monospace,Menlo,monospace;
    color:rgba(35,40,59,.32)}
  .clock.over{color:#B4543A}

  /* help chip — visible on load, auto-hides when the talk starts, H toggles */
  .help{position:absolute;right:26px;bottom:22px;max-width:340px;font-size:11.5px;
    color:rgba(35,40,59,.45);text-align:right;transition:opacity .3s}
  .help.hide{opacity:0}

  @media (prefers-reduced-motion: reduce){
    .still,.leg,.copy,.copy .chip,.copy h1,.copy p,.receipt,.founder{transition:none}
    .layer{animation:none}
    .copy h1{filter:none}
  }

  /* ---------- mobile / portrait ---------- */
  @media (max-width: 820px) and (orientation: portrait){
    /* keep the paper building in frame on a tall crop */
    .still,.leg{object-position:66% 55%}
    /* cream scrim so the copy reads over the cropped art */
    #stage::before{content:'';position:absolute;inset:0 0 auto 0;height:52vh;z-index:1;
      pointer-events:none;
      background:linear-gradient(to bottom,var(--cream) 0%,rgba(245,227,217,.92) 26%,
        rgba(245,227,217,.55) 40%,transparent 60%)}
    .copy,.founder,.rail,.clock,.help{z-index:2}
    .copy{top:max(20px,env(safe-area-inset-top));left:6vw;width:88vw;max-width:none;
      transform:translateY(8px)}
    .copy.in{transform:translateY(0)}
    .copy .chip{font-size:11px;padding:5px 10px 5px 13px;margin-bottom:14px}
    .copy h1{font-size:clamp(1.85rem,8.4vw,2.7rem);line-height:1.1}
    .copy p{margin-top:12px;font-size:1.02rem;line-height:1.45;max-width:none}
    .copy p.byline{font-size:12px;margin-top:12px}
    .receipt{margin-top:16px;padding:12px 16px;border-radius:10px}
    .receipt .r{font-size:13.5px;padding:5px 0}
    .founder{right:50%;top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 12vh);
      transform:translateX(50%) translateY(24px) scale(.94);
      width:min(48vw,220px)}
    .founder.show{transform:translateX(50%) translateY(0) scale(1)}
    .founder .fcap{font-size:11.5px;padding:9px 11px}
    .rail{bottom:max(16px,env(safe-area-inset-bottom));gap:6px}
    .dot{width:6px;height:6px}
    .dot:nth-child(6),.dot:nth-child(9){margin-left:8px}
    .clock{left:16px;bottom:max(14px,env(safe-area-inset-bottom))}
    .help{right:16px;bottom:max(14px,env(safe-area-inset-bottom));max-width:200px;font-size:10.5px}
  }
</style>
</head>
<body>
<div id="stage"></div>
<script src="presenter.js"></script>
</body>
</html>
